<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dream Place: Hawaii</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">

    <!-- NAVIGATION -->
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#attractions">Attractions</a></li>
            <li><a href="#food">Food</a></li>
            <li><a href="#gallery">Gallery</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <header class="hero">
        <h1>Hawaii 🌺</h1>
        <p>My dream place to visit</p>
    </header>

    <!-- ABOUT -->
    <section id="about">
        <h2>About Hawaii</h2>
        <p>
            Hawaii is a tropical paradise with stunning beaches, volcanoes, and lush landscapes.
        </p>
    </section>

    <!-- ATTRACTIONS -->
    <section id="attractions">
        <h2>Top Attractions</h2>
        <ul>
            <li>Waikiki Beach</li>
            <li>Volcanoes National Park</li>
            <li>Haleakalā Sunrise</li>
        </ul>
    </section>

    <!-- FOOD -->
    <section id="food">
        <h2>Food I Want to Try</h2>
        <div class="food-gallery">
            <img src="poke.png" alt="Poke Bowl">
            <img src="shavedice.png" alt="Shaved Ice">
        </div>
    </section>

    <!-- GALLERY -->
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery">
            <img src="waikiki.png" alt="Waikiki Beach">
            <img src="volcano.png" alt="Volcano">
            <img src="sunset.png" alt="Sunset Beach">
        </div>
    </section>

    <!-- BACK TO TOP -->
    <a href="#top" id="backToTop">⬆️</a>

</body>
</html>
